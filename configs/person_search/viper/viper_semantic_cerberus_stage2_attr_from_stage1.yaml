_BASE_: "viper_semantic_cerberus.yaml"

MODEL:
  # Override from command line with the actual stage1/official ViPer checkpoint when launching.
  WEIGHTS: ""

PERSON_SEARCH:
  REID:
    FREEZE_CERBERUS_BRANCH: False
    CERBERUS_TRAIN_BRANCH_ONLY: True
    CERBERUS_DETACH_VISUAL_INPUTS: True
    CERBERUS_PROTOTYPE_ALIGN_WEIGHT: 0.1

SOLVER:
  BASE_LR: 0.00005
  MAX_ITER: 10695
  STEPS: (4278,)
  LR_FACTORS: [1.0]
  LR_GROUP_REGEX: ["cerberus_branch.+"]
  FREEZE_PARAM_REGEX: ["^(?!cerberus_branch\\.).+"]
  CHECKPOINT_PERIOD: 1000
  IMS_PER_BATCH: 16

TEST:
  EVAL_PERIOD: 0

OUTPUT_DIR: "outputs/viper/PRW/viper_semantic_cerberus_stage2_attr_from_stage1"
